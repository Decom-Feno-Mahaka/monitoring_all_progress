version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dfm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dfm_user
      POSTGRES_PASSWORD: dfm_password
      POSTGRES_DB: dfm_projects
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dfm_user -d dfm_projects']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dfm_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
